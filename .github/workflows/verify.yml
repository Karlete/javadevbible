name: Integrity

# The site has no build step and no test suite, so nothing would otherwise stop
# a broken link or a stale search index from reaching production. This is the
# gate. It runs on every push and every pull request, and blocks the merge if
# the site's internal references do not hold together.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:          # allow running it by hand from the Actions tab

jobs:
  verify:
    name: Verify site integrity
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run integrity checks
        run: bash tools/verify.sh

# No setup-node, no npm install, no cache. The checker depends on nothing that
# is not already in a POSIX shell — which is the same constraint the site
# itself is built under.
